<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unlimited Colors</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            transition: background-color 0.5s ease;
        }

        .container {
            text-align: center;
            background: rgba(255,255,255,0.9);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        h1 {
            margin-bottom: 20px;
        }

        p {
            margin-bottom: 20px;
            font-size: 18px;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
        }

        #start {
            background: #28a745;
            color: white;
        }

        #stop {
            background: #dc3545;
            color: white;
        }

        #colorCode {
            font-weight: bold;
            font-size: 22px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Unlimited Colors</h1>
        <p>Current Color: <span id="colorCode">#FFFFFF</span></p>

        <button id="start">Start</button>
        <button id="stop">Stop</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
